  <h2>Add Book</h2>
<input id="title" placeholder="Title">
<input id="author" placeholder="Author">
<input id="qty" placeholder="Quantity">
<button onclick="addBook()">Add</button>

<h2>Search Book</h2>
<input id="search" placeholder="Enter title..." onkeyup="searchBook()">

<h2>Books List</h2>
<table border="1">
  <thead>
    <tr>
      <th>ID</th>
      <th>Title</th>
      <th>Author</th>
      <th>Quantity</th>
      <th>Action</th> 
    </tr>
  </thead>
  <tbody id="bookTable"></tbody>
</table>

<h2>Add User</h2>
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<button onclick="addUser()">Add</button>

<h2>Users List</h2>

<table border="1">
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Email</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody id="userTable"></tbody>
</table>

<h2>Issued Books</h2>

<table border="1">
  <thead>
    <tr>
      <th>ID</th>
      <th>Book</th>
      <th>User</th>
      <th>Issue Date</th>
      <th>Action</th> 
    </tr>
  </thead>

  <tbody id="issuedTable"></tbody>
</table>

<h2>Issue Book</h2>
<input id="bookId" placeholder="Book ID">
<input id="userId" placeholder="User ID">
<button onclick="issueBook()">Issue</button>

<h2>Return Book</h2>
<input id="returnBookId" placeholder="Book ID">
<button onclick="returnBook()">Return</button>

 <link rel="stylesheet" href="style.css">
 <script src="script.js"></script>
